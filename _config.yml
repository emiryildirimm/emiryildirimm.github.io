title:            "Emir's Cyber Security Notes"
tagline:          A beautiful theme.
description:      This website 
canonical: http://jekyll.gtat.me

# Owner/author information
owner:
  name:           Emir Yildirim
  avatar:         avatar.png
  bio:            "Penetration Tester"
  email:          emir67118@gmail.com
  twitter:        eemir_yldrmm
  github:         emiryildirimm
  instagram:      emiryildirim.m
  disqus:         balzac
  location:       "Erzurum, TR"

tools:
  standards:      "HTML, SCSS, Jekyll"
  software:       "git"

# Open Graph customization
opengraph:
  locale:           en_US

# Links to include in top navigation
# For external links add external: true
links:
  - title: About
    url: /about
  - title: Github
    url: https://github.com/emiryildirimm
    external: true
  - title: Emir Who?
    url: http://coletownsend.com
    external: true

# http://en.wikipedia.org/wiki/List_of_tz_database_time_zones
timezone:    America/New_York
future:      true
highlighter: pygments
markdown:    kramdown

kramdown:
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  use_coderay: false

  coderay:
    coderay_line_numbers:
    coderay_line_numbers_start: 1
    coderay_tab_width: 4
    coderay_bold_every: 10
    coderay_css: class

sass:
    style: :compressed

# https://github.com/mojombo/jekyll/wiki/Permalinks
permalink:   /:categories/:title

include: [".htaccess"]
exclude: ["lib", "config.rb", "Capfile", "config", "log", "Rakefile", "Rakefile.rb", "tmp"]
